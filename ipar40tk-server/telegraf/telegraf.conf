###############################################################################
# TELEGRAF CONFIGURATION FOR LATHE MONITORING
###############################################################################

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "5s"

###############################################################################
# MQTT FLOAT INPUT
###############################################################################

[[inputs.mqtt_consumer]]

  servers = ["tcp://mosquitto:1883"]

  topics = [
    "factory/+/temperature/#",
    "factory/+/speed/#"
  ]

  username = "bmetk"
  password = "iot26"

  qos = 0
  connection_timeout = "20s"

  data_format = "value"
  data_type = "float"

  name_override = "lathe_raw"

###############################################################################
# TOPIC FLOAT PARSING
###############################################################################

  [[inputs.mqtt_consumer.topic_parsing]]

    topic = "factory/+/+/+/+"

    tags = "_/machine/aspect/sensor/metric"

###############################################################################
# MQTT CURRENT INPUT
###############################################################################

[[inputs.mqtt_consumer]]

  servers = ["tcp://mosquitto:1883"]

  topics = [
    "factory/+/current/#"
  ]

  username = "bmetk"
  password = "iot26"

  qos = 0
  connection_timeout = "20s"

  data_format = "value"
  data_type = "string"

  name_override = "lathe_current_raw"

###############################################################################
# TOPIC CURRENT PARSING
###############################################################################

   [[inputs.mqtt_consumer.topic_parsing]]

    topic = "factory/+/+/+/+"

    tags = "_/machine/aspect/sensor/metric"

###############################################################################
# MQTT VIBRATION INPUT
###############################################################################

[[inputs.mqtt_consumer]]

  servers = ["tcp://mosquitto:1883"]

  topics = [
    "factory/+/vibration/#"
  ]

  username = "bmetk"
  password = "iot26"

  data_format = "value"
  data_type = "string"

  name_override = "lathe_vibration_raw"

###############################################################################
# TOPIC VIBRATION PARSING
###############################################################################

   [[inputs.mqtt_consumer.topic_parsing]]

    topic = "factory/+/+/+/+"

    tags = "_/machine/aspect/sensor/metric"

###############################################################################
# MQTT ESP1 STATUS INPUT
###############################################################################

[[inputs.mqtt_consumer]]

  servers = ["tcp://mosquitto:1883"]

  topics = [
    "factory/+/status/esp1"
  ]

  username = "bmetk"
  password = "iot26"

  qos = 0
  connection_timeout = "20s"

  data_format = "json_v2"

  name_override = "lathe_status_esp1"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "lathe_status"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "esp1"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "mqtt"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temp"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rpm"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "current"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "esp2"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "esp2_collect"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "esp2_mpu"
      type = "bool"

###############################################################################
# TOPIC ESP1 STATUS PARSING
###############################################################################

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "factory/+/status/esp1"
    tags = "_/machine/_/_"

###############################################################################
# MQTT ESP2 STATUS INPUT
###############################################################################

[[inputs.mqtt_consumer]]

  servers = ["tcp://mosquitto:1883"]

  topics = [
    "factory/+/status/esp2"
  ]

  username = "bmetk"
  password = "iot26"

  qos = 0
  connection_timeout = "20s"

  data_format = "json_v2"
  name_override = "lathe_status_esp2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "lathe_status"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "esp2"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "mqtt"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "mpu"
      type = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "esp1"
      type = "bool"

###############################################################################
# TOPIC ESP2 STATUS PARSING
###############################################################################

[[inputs.mqtt_consumer.topic_parsing]]
    topic = "factory/+/status/esp2"
    tags = "_/machine/_/_"

